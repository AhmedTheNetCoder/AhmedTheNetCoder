<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="150" viewBox="0 0 1200 150" fill="none" role="img" aria-label="Press start — challenge the Observatory AI in your browser">
  <defs>
    <linearGradient id="t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="1198" height="148" rx="16" fill="#0e141d" stroke="#263143" stroke-width="1.5"/>
  <rect x="3" y="3" width="1194" height="144" rx="14" fill="none" stroke="url(#t)" stroke-opacity="0.5" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="3s" repeatCount="indefinite"/>
  </rect>
  <g fill="#e2e8f0" opacity="0.5">
    <circle cx="60" cy="40" r="1.4"/><circle cx="130" cy="110" r="1.1"/><circle cx="1080" cy="35" r="1.4"/>
    <circle cx="1150" cy="100" r="1.1"/><circle cx="990" cy="120" r="1.2"/><circle cx="210" cy="30" r="1"/>
  </g>
  <!-- play button -->
  <g transform="translate(95,75)">
    <circle r="38" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#g)">
      <animate attributeName="r" values="36;40;36" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M-10,-17 L20,0 L-10,17 Z" fill="#22d3ee" filter="url(#g)"/>
  </g>
  <text x="170" y="68" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="34" font-weight="800" letter-spacing="2" fill="url(#t)" filter="url(#g)">PRESS START — CHALLENGE THE OBSERVATORY AI</text>
  <text x="172" y="100" font-family="'Consolas','Courier New',monospace" font-size="15" letter-spacing="1" fill="#94a3b8">Plays instantly in your browser · no sign-up · perfect minimax — it has never lost</text>
  <text x="1130" y="88" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="13" letter-spacing="3" fill="#4ade80">
    INSERT COIN ▸
    <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
  </text>
</svg>
