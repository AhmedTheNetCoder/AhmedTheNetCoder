<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none" role="img" aria-label="Ahmed Al-Khaldi — Cosmic Data Observatory">
  <defs>
    <radialGradient id="space" cx="30%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#141b34"/>
      <stop offset="45%" stop-color="#0b1022"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="70%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- deep space -->
  <rect width="1200" height="300" fill="url(#space)"/>

  <!-- twinkling starfield -->
  <g fill="#ffffff">
    <circle cx="80"  cy="50"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="120" r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="70"  r="1.6"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.8s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="210" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="240" r="1.3"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.4s" begin="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="90"  r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="160" r="1.5"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.6s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="60"  r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="230" r="1.4"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="770" cy="120" r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="200" r="1.6"><animate attributeName="opacity" values="0.1;0.85;0.1" dur="3.9s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="70"  r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="240" r="1.3"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.3s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="140" r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="1160" cy="60"  r="1.5"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.7s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="30"  cy="150" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" begin="1.0s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="150" r="0.9"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.2s" begin="0.1s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="250" r="1.0"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.5s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="150" r="0.9"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="2.1s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="30" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shooting star -->
  <g opacity="0">
    <line x1="0" y1="0" x2="60" y2="18" stroke="#e0f2fe" stroke-width="2" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="-120,-40; 1300,360" dur="7s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.72;1" dur="7s" begin="2s" repeatCount="indefinite"/>
  </g>

  <!-- orbiting observatory (right side) -->
  <g transform="translate(1010,150)">
    <ellipse rx="130" ry="46" fill="none" stroke="url(#ring)" stroke-width="2"/>
    <circle r="34" fill="url(#planet)"/>
    <ellipse rx="52" ry="16" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.55" transform="rotate(-22)"/>
    <g>
      <circle cx="130" cy="0" r="5" fill="#22d3ee"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="0" cy="0" r="3.5" fill="#f472b6"/>
      <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="9s" repeatCount="indefinite"/>
      <animateMotion path="M130,0 A130,46 0 1,1 -130,0 A130,46 0 1,1 130,0" dur="9s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- title block -->
  <g filter="url(#glow)">
    <text x="70" y="120" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#title)" letter-spacing="1">AHMED AL-KHALDI</text>
  </g>
  <text x="72" y="158" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#22d3ee" letter-spacing="3">// COSMIC DATA OBSERVATORY</text>
  <rect x="405" y="141" width="12" height="20" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <text x="72" y="196" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="1">Data Analyst  ·  Power BI Developer  ·  Astrophotographer</text>

  <!-- status telemetry line -->
  <g font-family="'Courier New', monospace" font-size="13" fill="#64748b">
    <text x="72" y="238">◍ STATUS:</text>
    <text x="150" y="238" fill="#4ade80">ONLINE</text>
    <text x="230" y="238">◍ SIGNAL:</text>
    <text x="308" y="238" fill="#22d3ee">DATA + LIGHT</text>
    <text x="430" y="238">◍ LAT/LON:</text>
    <text x="512" y="238" fill="#a78bfa">23.5859° N, 58.4059° E</text>
  </g>

  <!-- bottom scan line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#ring)"/>
</svg>
