<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="40" viewBox="0 0 1000 40" fill="none" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="40" y1="20" x2="960" y2="20" stroke="url(#line)" stroke-width="2"/>
  <g fill="#22d3ee">
    <circle cx="500" cy="20" r="4">
      <animate attributeName="r" values="3;6;3" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="420" cy="20" r="1.5" fill="#a78bfa"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="580" cy="20" r="1.5" fill="#a78bfa"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1s" repeatCount="indefinite"/></circle>
  <circle cx="300" cy="20" r="1.2" fill="#38bdf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="20" r="1.2" fill="#38bdf8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1.4s" repeatCount="indefinite"/></circle>
</svg>
