name: Observatory Scoreboard

on:
  issues:
    types: [opened]
  workflow_dispatch:

concurrency:
  group: scoreboard
  cancel-in-progress: false

jobs:
  record:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.title, 'score|')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Record result / render
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python .github/scripts/score.py render
          else
            python .github/scripts/score.py record
          fi

      - name: Commit scoreboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/scoreboard.svg README.md .github/game/scoreboard.json
          if ! git diff --cached --quiet; then
            git pull --rebase --autostash origin main
            git commit -m "scoreboard: record transmission"
            git push
          fi

      - name: Reply and close issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f .github/game/comment.txt ]; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file .github/game/comment.txt
          fi
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
