name: Transmission of the Day

on:
  schedule:
    - cron: "5 0 * * *"       # daily just after midnight UTC
  workflow_dispatch:

jobs:
  transmission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate quote SVG
        run: bash .github/scripts/transmission.sh
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/transmission.svg
          git diff --cached --quiet || { git commit -m "Update transmission of the day"; git push; }
