name: Observatory Tic-Tac-Toe

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      mode:
        description: "render or reset"
        default: "render"

concurrency:
  group: ttt
  cancel-in-progress: false

jobs:
  play:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, 'ttt|')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Apply move / render
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python .github/scripts/ttt.py "${{ inputs.mode }}"
          else
            python .github/scripts/ttt.py move
          fi

      - name: Commit board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ttt README.md .github/game/ttt-state.json
          if ! git diff --cached --quiet; then
            git pull --rebase --autostash origin main
            git commit -m "ttt: update board"
            git push
          fi

      - name: Reply and close issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f .github/game/comment.txt ]; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file .github/game/comment.txt
          fi
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
